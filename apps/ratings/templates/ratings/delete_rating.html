{% extends "base.html" %}

{% block title %}删除评分 | 图书推荐系统{% endblock %}

{% block content %}
  <section class="auth-panel">
    <p class="section-kicker">删除评分</p>
    <h1 class="page-title">删除 {{ book.title }} 的评分</h1>
    <p class="auth-hint">这会移除当前生效的评分，并在评分历史中记录删除操作。</p>
    <form method="post">
      {% csrf_token %}
      <div class="panel-actions">
        <button type="submit" class="btn btn-danger">删除评分</button>
        <a class="btn btn-outline-dark" href="{% url 'accounts:profile' %}">取消</a>
      </div>
    </form>
  </section>
{% endblock %}
