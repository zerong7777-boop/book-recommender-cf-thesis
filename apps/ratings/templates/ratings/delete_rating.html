{% extends "base.html" %}

{% block title %}Delete rating | Book Recommender{% endblock %}

{% block content %}
  <section class="auth-panel">
    <p class="section-kicker">Rating removal</p>
    <h1 class="page-title">Delete rating for {{ book.title }}</h1>
    <p class="auth-hint">This removes the current effective rating and records the delete action in rating history.</p>
    <form method="post">
      {% csrf_token %}
      <div class="panel-actions">
        <button type="submit" class="btn btn-danger">Delete rating</button>
        <a class="btn btn-outline-dark" href="{% url 'accounts:profile' %}">Cancel</a>
      </div>
    </form>
  </section>
{% endblock %}
