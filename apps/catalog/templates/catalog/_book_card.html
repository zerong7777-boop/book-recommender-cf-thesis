<article class="book-card">
  {% if book.cover_url %}
    <div class="book-card-image">
      <img src="{{ book.cover_url }}" alt="{{ book.title }}">
    </div>
  {% else %}
    <div class="book-card-placeholder">
      <span>{{ book.title|first|upper }}</span>
    </div>
  {% endif %}
  <div class="book-card-body">
    <h2 class="book-card-title">
      {% if book.pk %}
        <a class="book-card-link" href="{% url 'catalog:book_detail' book.pk %}">{{ book.title }}</a>
      {% else %}
        {{ book.title }}
      {% endif %}
    </h2>
    <p class="book-card-author mb-2">{{ book.author }}</p>
    {% if book.category %}
      <p class="book-card-meta mb-0">
        <a href="{% url 'catalog:category_list' book.category.slug %}">{{ book.category.name }}</a>
      </p>
    {% endif %}
  </div>
</article>
