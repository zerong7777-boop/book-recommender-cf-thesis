{% extends "base.html" %}

{% block title %}Rate {{ book.title }} | Book Recommender{% endblock %}

{% block content %}
  <h1>Rate {{ book.title }}</h1>
  <form method="post" class="mt-3">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Save rating</button>
  </form>
{% endblock %}
