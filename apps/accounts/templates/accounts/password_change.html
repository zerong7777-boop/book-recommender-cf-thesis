{% extends "base.html" %}

{% block title %}Change password | Book Recommender{% endblock %}

{% block content %}
  <section class="auth-panel">
    <p class="section-kicker">Account security</p>
    <h1 class="page-title">Change password</h1>
    <p class="auth-hint">Update the current account password without leaving the logged-in session.</p>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <div class="panel-actions">
        <button type="submit" class="btn btn-dark">Change password</button>
        <a class="btn btn-outline-dark" href="{% url 'accounts:profile' %}">Back to profile</a>
      </div>
    </form>
  </section>
{% endblock %}
