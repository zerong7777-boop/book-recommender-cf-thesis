{% extends "base.html" %}

{% block title %}修改密码 | 图书推荐系统{% endblock %}

{% block content %}
  <section class="auth-panel">
    <p class="section-kicker">账户安全</p>
    <h1 class="page-title">修改密码</h1>
    <p class="auth-hint">无需退出当前登录状态，即可更新账户密码。</p>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <div class="panel-actions">
        <button type="submit" class="btn btn-dark">修改密码</button>
        <a class="btn btn-outline-dark" href="{% url 'accounts:profile' %}">返回个人中心</a>
      </div>
    </form>
  </section>
{% endblock %}
