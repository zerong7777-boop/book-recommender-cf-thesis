<article class="card h-100">
  {% if book.cover_url %}
    <img src="{{ book.cover_url }}" class="card-img-top" alt="{{ book.title }}">
  {% endif %}
  <div class="card-body">
    <h2 class="h5 card-title">
      {% if book.pk %}
        <a href="{% url 'catalog:book_detail' book.pk %}">{{ book.title }}</a>
      {% else %}
        {{ book.title }}
      {% endif %}
    </h2>
    <p class="card-text text-muted mb-2">{{ book.author }}</p>
    {% if book.category %}
      <p class="card-text small">
        <a href="{% url 'catalog:category_list' book.category.slug %}">{{ book.category.name }}</a>
      </p>
    {% endif %}
  </div>
</article>
